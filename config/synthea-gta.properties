# Maple Grove GTA Synthea configuration

# Generate CSV files for the OpenEMR import pipeline.
exporter.csv.export = true
exporter.fhir.export = false
exporter.hospital.fhir.export = false
exporter.practitioner.fhir.export = false

# GTA and Canadian geography.
generate.demographics.default_file = geography/demographics_gta.csv
generate.geography.zipcodes.default_file = geography/zipcodes_gta.csv
generate.geography.timezones.default_file = geography/timezones_ca.csv
generate.geography.country_code = CA

# Canadian healthcare providers.
generate.providers.hospitals.default_file = providers/hospitals_ca.csv
generate.providers.longterm.default_file = providers/longterm_ca.csv
generate.providers.nursing.default_file = providers/nursing_ca.csv
generate.providers.veterans.default_file = providers/va_facilities_ca.csv
generate.providers.urgentcare.default_file = providers/urgent_care_facilities_ca.csv
generate.providers.primarycare.default_file = providers/primary_care_facilities_ca.csv

# Canadian public health insurance.
generate.payers.insurance_companies.default_file = payers/insurance_companies_ca.csv
generate.payers.insurance_plans.default_file = payers/insurance_plans_ca.csv
generate.payers.insurance_plans.eligibilities_file = payers/insurance_eligibilities_ca.csv
generate.payers.selection_behavior = priority

# GTA patients use Ontario public insurance for special payer categories.
generate.payers.insurance_companies.medicare = Ontario Health Insurance
generate.payers.insurance_companies.medicaid = Ontario Health Insurance
generate.payers.insurance_companies.dual_eligible = Ontario Health Insurance

# Keep synthetic names readable.
generate.append_numbers_to_person_names = false

# Disable unused FHIR transaction bundle mode.
exporter.fhir.transaction_bundle = false
